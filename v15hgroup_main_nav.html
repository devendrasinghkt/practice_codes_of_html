<!DOCTYPE html>
<html>
<head>
    <title>hgroup, nav and main Example</title>
</head>
<body>

    <hgroup>
        <h1>My Website</h1>
        <h2>Learning HTML Semantic Tags</h2>
    </hgroup>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <main>
        <h2>Welcome</h2>
        <p>This is the main content of the webpage.</p>
        <p>The main tag contains the primary information of the page.</p>
    </main>

</body>
</html>
