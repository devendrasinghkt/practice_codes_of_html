<html>
    <head>
        <title>input type number</title>
    </head>
    <body>
        <form action="">
            <label for="exp1">Enter the experience</label>
            <input type="number" id="exp1" name="exp1">
            <br>
            <br>
            <label for="exp2">experience between 0 and 40 </label>
            <input type="number" id="exp2" name="exp2" min="0" max="40">
            <br>
            <br>
            <label for="exp3"> Default experience field :</label>
            <input type="number" id="exp3" name="exp3" value="3">
            <br><br>
            <label for="exp4"> Required experience field :</label>
            <input type="text" id="exp4 " name="exp5" required>
            <br>
            <br>
            <label for="exp5"> experience in decimal (stepl 0.5):</label>
            <input type="number"  name="exp5" step="0.5">
            <br><br>
            <label for="exp6" >Read only experience  : </label>
            <input type="number" id="exp6" value="5" readonly>
             <br>
             <br>
            <label for="exp7">Disabled experience (not editable ):</label>
            <input type="number" id="exp7" value="10" disabled>
            <br>
            <br>
            <input type="submit" value="submit">
            <input type="reset" value="clear form">
        </form>
    </body>
</html>
