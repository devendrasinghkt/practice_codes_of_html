<!DOCTYPE html>
<html>
<head>
    <title>TH Tag Example</title>
</head>
<body>

    <h2>Student Details</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Devendra</td>
            <td>20</td>
            <td>Dadri</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>21</td>
            <td>Noida</td>
        </tr>
    </table>

</body>
</html>
