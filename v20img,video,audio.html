<!DOCTYPE html>
<html>
<head>
    <title>Image, Audio and Video Example</title>
</head>
<body>

    <h2>Image Example</h2>
    <img src="./img/download.jpeg" alt="Sample Image" width="200">

    <h2>Audio Example</h2>
    <audio controls>
        <source src="./audio/iphone-13-30-00-62001.mp3" type="audio/mpeg">
    </audio>

    <h2>Video Example</h2>
    <video width="300" controls>
        <source src="./video/18127221-hd_1080_1920_30fps.mp4" type="video/mp4">
    </video>

</body>
</html>
