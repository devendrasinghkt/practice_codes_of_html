<html>
    <head>
        <title>Page layout using Table</title>
    </head>
    <body>
        <h1>Page layout using Table</h1>
        <table border="1" height="80%" width="100%" style="text-align: center;">
            <thead height="25%">
                <tr>
                    <td colspan="2">&lt Header &gt</td>
                </tr>
                <tr>
                    <td colspan="2">&lt Navbar &gt</td>
                </tr>
            </thead>

            <tbody height="50%" width="100%">
                <tr>
                    <td height="15%">&lt Section &gt</td>
                    <td rowspan="4">&lt aside &gt</td>
                    
                    
                </tr>
                <tr>
                    <td height="15%" width="70%">&lt Heading &gt</td>
                    
                    
                </tr>
                <tr>
                    <td height="15%" width="70%">&lt Article &gt</td>
                    
                    
                </tr>
                <tr>
                    <td> </td> 
                   
                </tr>
                
                
            </tbody>
            <tfoot height="25%" width="100%">
                <tr">
                    <td colspan="2">&lt footer &gt</td>
                    
                </tr>
            </tfoot>
        </table>
    </body>
</html>>
