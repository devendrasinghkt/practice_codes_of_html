<!DOCTYPE html>
<html>
<head>
    <title>Table Tag Example</title>
</head>
<body>

    <h2>Student Information</h2>

    <table border="1">
        <tr>
            <td>Name</td>
            <td>Age</td>
            <td>City</td>
        </tr>

        <tr>
            <td>Devendra</td>
            <td>20</td>
            <td>Dadri</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>21</td>
            <td>Noida</td>
        </tr>
    </table>

</body>
</html>
