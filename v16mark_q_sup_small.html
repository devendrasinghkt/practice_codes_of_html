<!DOCTYPE html>
<html>
<head>
    <title>Mark, Q, Small and Sup Tags</title>
</head>
<body>

    <p>This is a <mark>highlighted text</mark>.</p>

    <p>Teacher said, <q>Practice HTML every day.</q></p>

    <p><small>This text is displayed in a smaller size.</small></p>

    <p>The formula of water is H<sub>2</sub>O.</p>

    <p>2<sup>3</sup> = 8</p>

</body>
</html>
