<html>
    <head>
        <title>Progress vs Range</title>
    </head>
    <body>

        <h2>Difference Between Progress and Range</h2>

        <h3>Progress Tag</h3>
        <label>File Download Progress :</label>
        <progress value="60" max="100"></progress>
        <p>60% completed</p>

        <br>

        <h3>Input Type Range</h3>
        <label for="volume">Volume Control :</label>
        <input type="range" id="volume" name="volume"
               min="0" max="100" value="60">

    </body>
</html>
