<html>
<head>
    <title>Month Attribute Types</title>
</head>
<body>
    <h2>Month Attribute Types</h2>

    <form>
        <label for="month1">Basic Month Input</label>
        <input type="month" id="month1" name="month1">
        <br><br>

        <label for="month2">Month with Range</label>
        <input type="month" id="month2" name="month2"
               min="2025-01" max="2026-12">
        <br><br>

        <label for="month3">Month with Default Value</label>
        <input type="month" id="month3" name="month3"
               value="2026-06">
        <br><br>

        <label for="month4">Required Month</label>
        <input type="month" id="month4" name="month4"
               required>
        <br><br>

        <label for="month5">Read Only Month</label>
        <input type="month" id="month5" name="month5"
               value="2026-05" readonly>
        <br><br>

        <label for="month6">Disabled Month</label>
        <input type="month" id="month6" name="month6"
               disabled>
        <br><br>

        <input type="submit" value="Submit Form">
        <input type="reset" value="Clear Form">
    </form>
</body>
</html>
