<html>
    <head>
        <title>input type range</title>
    </head>
    <body>
        <form action="">
            <label for="range1">Basic range input :</label>
            <input type="range" id="range1" name="range1">
            <br>
            <br>

            <label for="range2">Range between 0 and 100 :</label>
            <input type="range" id="range2" name="range2" min="0" max="100">
            <br>
            <br>

            <label for="range3">Default range value :</label>
            <input type="range" id="range3" name="range3" value="50">
            <br>
            <br>

            <label for="range4">Required range field :</label>
            <input type="range" id="range4" name="range4" required>
            <br>
            <br>

            <label for="range5">Range with step value 5 :</label>
            <input type="range" id="range5" name="range5" min="0" max="100" step="5">
            <br>
            <br>

            <label for="range6">Read only range :</label>
            <input type="range" id="range6" name="range6" value="30" disabled>
            <br>
            <br>

            <label for="range7">Disabled range :</label>
            <input type="range" id="range7" name="range7" value="70" disabled>
            <br>
            <br>

            <input type="submit" value="submit">
            <input type="reset" value="clear form">
        </form>
    </body>
</html>
