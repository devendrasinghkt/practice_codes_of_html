<!DOCTYPE html>
<html style="height: 100%;">
<head>
    <title>Relative Table Width</title>
</head>
<body style="height: 100%; background-color: aquamarine;" >

    <table border="1" style="height:40%; width:100%;">
        <caption>Height 40 & width 100 according to screen size</caption>
        <tr>
            <td>Name</td>
            <td>Age</td>
        </tr>
        <tr>
            <td>Devendra</td>
            <td>20</td>
        </tr>
    </table>
    <table border="1" style="height:40%; width:50%;">
        <caption>Height 40 & width 50 according to screen size</caption>
        <tr>
            <td>Name</td>
            <td>Age</td>
        </tr>
        <tr>
            <td>Devendra</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
