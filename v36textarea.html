<!DOCTYPE html>
<html lang="en">
<head>
    <title>textarea tag</title>
</head>
<body>
    <form >
        <label for="studentname">Student Name</label>
        <input type="text" id="studentname" name="Student name" value="">
        <br>
        <label for="feedback">feedback</label>
        <textarea  id="feedback" name="feedback" rows="5" cols="40" placeholder="Enter the thoughts here ..."></textarea>
        <br>
        <br>
        <input type="submit" value="submit feedback">
        <input type="reset" value="clear form">
    </form>
</body>
</html>
