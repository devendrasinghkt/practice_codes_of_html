<!DOCTYPE html>
<html>
<head>
    <title>Table Size Example</title>
</head>
<body>

    <table border="1" width="300px" height="100px">
        <tr> <h3> height 100px & width300px </h3>
            <td>Name</td>
            <td>Age</td>
        </tr>
        <tr>
            <td>Devendra</td>
            <td>20</td>
        </tr>
    </table>
    <table border="1" width="800" height="200px">
        <tr> <h3> height 800px & width200px </h3>
            <td>Name</td>
            <td>Age</td>
        </tr>
        <tr>
            <td>Devendra</td>
            <td>20</td>
        </tr>
    </table>

</body>
</html>
