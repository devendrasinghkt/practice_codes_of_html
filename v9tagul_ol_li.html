<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Woriking of ul ol & li tags </h1>
    <h2>ul means unordered list </h2>
    <ul> <h3>Fruits Name</h3>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
        <li>Kiwi</li>
        <li>Dragon Fruits</li>
        <li>coconut</li>
    </ul>
     <h2>ul means ordered list </h2>
     <ol> <h3>Fruits Name</h3>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
        <li>Kiwi</li>
        <li>Dragon Fruits</li>
        <li>coconut</li>
     </ol>
     
     
</body>
</html>
